<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollama Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { background: #16213e; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
header h1 { font-size: 18px; color: #e94560; }
#status { font-size: 12px; color: #888; }
#status.online { color: #4caf50; }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 260px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 12px 16px; font-size: 13px; color: #888; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
.sidebar-header span { color: #e94560; font-weight: 500; }
#file-list { flex: 1; overflow-y: auto; padding: 8px; }
.file-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; border: 1px solid transparent; }
.file-item:hover { background: #0f3460; }
.file-item.active { background: #0f3460; border-color: #e94560; }
.file-item .fname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.file-item .del { color: #e94560; background: none; border: none; cursor: pointer; font-size: 16px; padding: 0 4px; flex-shrink: 0; }
.file-item .modified { width: 6px; height: 6px; border-radius: 50%; background: #e94560; flex-shrink: 0; margin-right: 6px; display: none; }
.file-item.modified-file .modified { display: block; }
label.upload-btn { margin: 12px; background: #0f3460; border: 1px dashed #e94560; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; font-size: 13px; color: #e94560; display: block; }
label.upload-btn:hover { background: #1a1a2e; }
#file-input { display: none; }
.editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.editor-toolbar { background: #16213e; padding: 8px 16px; border-bottom: 1px solid #0f3460; display: flex; gap: 8px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
.editor-toolbar span { font-size: 13px; color: #888; margin-right: 8px; }
button.tb-btn { background: #0f3460; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 12px; color: #e0e0e0; font-size: 12px; cursor: pointer; }
button.tb-btn:hover { border-color: #e94560; color: #e94560; }
button.tb-btn.primary { background: #e94560; border-color: #e94560; color: white; }
button.tb-btn.primary:hover { background: #c73652; }
button.tb-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#editor { flex: 1; background: #0d0d1a; color: #e0e0e0; border: none; padding: 16px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; overflow-y: auto; }
.chat-panel { width: 380px; background: #16213e; border-left: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
.chat-panel-header { padding: 12px 16px; border-bottom: 1px solid #0f3460; font-size: 13px; color: #888; }
#messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.msg { padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg.user { background: #0f3460; align-self: flex-end; max-width: 90%; border-bottom-right-radius: 4px; }
.msg.assistant { background: #1a1a2e; align-self: flex-start; max-width: 95%; border: 1px solid #0f3460; border-bottom-left-radius: 4px; }
.msg.thinking { color: #888; font-style: italic; }
#chat-input-area { padding: 10px; border-top: 1px solid #0f3460; display: flex; flex-direction: column; gap: 8px; }
#prompt { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px; padding: 8px 12px; color: #e0e0e0; font-size: 13px; resize: none; min-height: 60px; max-height: 100px; outline: none; width: 100%; }
#prompt:focus { border-color: #e94560; }
.chat-actions { display: flex; gap: 6px; }
.api-config { padding: 10px 16px; border-top: 1px solid #0f3460; display: flex; gap: 6px; align-items: center; }
.api-config input { flex: 1; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; padding: 5px 8px; color: #e0e0e0; font-size: 11px; outline: none; }
.api-config label { font-size: 11px; color: #555; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <h1>Ollama Editor</h1>
  <span id="status">Verificando...</span>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Arquivos <span id="file-count">0</span></div>
    <div id="file-list"></div>
    <label class="upload-btn" for="file-input">+ Carregar arquivos</label>
    <input type="file" id="file-input" multiple accept=".html,.js,.ts,.jsx,.tsx,.css,.json,.md,.txt,.php,.py,.sql,.env,.vue,.scss">
  </div>

  <div class="editor-area">
    <div class="editor-toolbar">
      <span id="current-file">Nenhum arquivo</span>
      <button class="tb-btn" onclick="saveFile()" id="save-btn" disabled>Salvar alterações</button>
      <button class="tb-btn" onclick="downloadFile()" id="download-btn" disabled>Baixar arquivo</button>
      <button class="tb-btn" onclick="downloadAll()" id="download-all-btn" disabled>Baixar todos (.zip)</button>
    </div>
    <textarea id="editor" placeholder="Selecione um arquivo na lista para editar..." readonly></textarea>
  </div>

  <div class="chat-panel">
    <div class="chat-panel-header">Chat com Gemma — peça para editar o arquivo atual</div>
    <div id="messages">
      <div class="msg assistant">Ola! Carregue seus arquivos e me diga o que quer editar. Ex: "Adicione um botao de WhatsApp no rodape" ou "Corrija os erros de JavaScript".</div>
    </div>
    <div id="chat-input-area">
      <textarea id="prompt" placeholder="Ex: Adicione um menu responsivo no topo..."></textarea>
      <div class="chat-actions">
        <button class="tb-btn primary" onclick="askAI()" id="ask-btn" style="flex:1">Enviar para IA</button>
        <button class="tb-btn" onclick="applyLastCode()" id="apply-btn" disabled>Aplicar codigo</button>
      </div>
    </div>
    <div class="api-config">
      <label>API:</label>
      <input type="text" id="api-url" value="http://45.79.213.38:11434" placeholder="http://IP:11434">
      <button class="tb-btn" onclick="checkStatus()">Testar</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let files = {};
let currentFile = null;
let lastCode = null;

function getAPI() { return document.getElementById('api-url').value.trim(); }

async function checkStatus() {
  const s = document.getElementById('status');
  s.textContent = 'Verificando...'; s.className = '';
  try {
    const r = await fetch(getAPI() + '/api/tags');
    if (r.ok) { s.textContent = 'Conectado'; s.className = 'online'; }
    else { s.textContent = 'Erro ' + r.status; }
  } catch(e) { s.textContent = 'Sem conexao'; }
}
checkStatus();

document.getElementById('file-input').addEventListener('change', async function() {
  for (const file of this.files) {
    const text = await file.text();
    files[file.name] = text;
  }
  this.value = '';
  renderFileList();
  if (Object.keys(files).length > 0 && !currentFile) openFile(Object.keys(files)[0]);
});

function renderFileList() {
  const el = document.getElementById('file-list');
  el.innerHTML = '';
  const names = Object.keys(files);
  document.getElementById('file-count').textContent = names.length;
  document.getElementById('download-all-btn').disabled = names.length === 0;
  names.forEach(name => {
    const div = document.createElement('div');
    div.className = 'file-item' + (name === currentFile ? ' active' : '');
    div.innerHTML = `<div class="modified"></div><div class="fname" title="${name}">${name}</div><button class="del" onclick="deleteFile('${name}')">x</button>`;
    div.querySelector('.fname').onclick = () => openFile(name);
    el.appendChild(div);
  });
}

function openFile(name) {
  if (currentFile) {
    files[currentFile] = document.getElementById('editor').value;
  }
  currentFile = name;
  const editor = document.getElementById('editor');
  editor.value = files[name];
  editor.readOnly = false;
  document.getElementById('current-file').textContent = name;
  document.getElementById('save-btn').disabled = false;
  document.getElementById('download-btn').disabled = false;
  renderFileList();
}

function saveFile() {
  if (!currentFile) return;
  files[currentFile] = document.getElementById('editor').value;
  addMessage('assistant', 'Arquivo "' + currentFile + '" salvo!');
}

function deleteFile(name) {
  delete files[name];
  if (currentFile === name) {
    currentFile = null;
    document.getElementById('editor').value = '';
    document.getElementById('editor').readOnly = true;
    document.getElementById('current-file').textContent = 'Nenhum arquivo';
    document.getElementById('save-btn').disabled = true;
    document.getElementById('download-btn').disabled = true;
  }
  renderFileList();
}

function downloadFile() {
  if (!currentFile) return;
  files[currentFile] = document.getElementById('editor').value;
  const blob = new Blob([files[currentFile]], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFile;
  a.click();
}

async function downloadAll() {
  if (currentFile) files[currentFile] = document.getElementById('editor').value;
  const zip = new JSZip();
  Object.entries(files).forEach(([name, content]) => zip.file(name, content));
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'arquivos.zip';
  a.click();
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

function extractCode(text) {
  const match = text.match(/```[\w]*\n([\s\S]*?)```/);
  return match ? match[1] : null;
}

async function askAI() {
  if (!currentFile) { addMessage('assistant', 'Selecione um arquivo primeiro!'); return; }
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return;

  files[currentFile] = document.getElementById('editor').value;
  const fileContent = files[currentFile];

  const userMsg = prompt + ' [' + currentFile + ']';
  addMessage('user', userMsg);
  document.getElementById('prompt').value = '';

  const btn = document.getElementById('ask-btn');
  btn.disabled = true;

  const systemPrompt = `Voce e um assistente de codigo. O usuario vai pedir modificacoes em arquivos. 
Sempre responda com o codigo completo modificado dentro de blocos de codigo markdown.
Exemplo: \`\`\`html\n(codigo completo aqui)\n\`\`\`
Nao explique muito, so faca a modificacao pedida e retorne o arquivo completo.`;

  const userContent = `Arquivo: ${currentFile}\n\nConteudo atual:\n\`\`\`\n${fileContent}\n\`\`\`\n\nPedido: ${prompt}`;

  const assistantDiv = addMessage('assistant thinking', 'Editando...');

  try {
    const response = await fetch(getAPI() + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gemma4:e2b',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userContent }
        ],
        stream: true
      })
    });

    assistantDiv.textContent = '';
    assistantDiv.className = 'msg assistant';
    let fullReply = '';

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value).split('\n').filter(l => l.trim());
      for (const line of lines) {
        try {
          const data = JSON.parse(line);
          if (data.message && data.message.content) {
            fullReply += data.message.content;
            assistantDiv.textContent = fullReply;
            assistantDiv.scrollIntoView({ behavior: 'smooth' });
          }
        } catch(e) {}
      }
    }

    lastCode = extractCode(fullReply);
    if (lastCode) {
      document.getElementById('apply-btn').disabled = false;
      addMessage('assistant', 'Codigo pronto! Clique em "Aplicar codigo" para substituir o arquivo.');
    }
  } catch(e) {
    assistantDiv.textContent = 'Erro ao conectar. Verifique o IP da API.';
    assistantDiv.className = 'msg assistant';
  }
  btn.disabled = false;
}

function applyLastCode() {
  if (!lastCode || !currentFile) return;
  document.getElementById('editor').value = lastCode;
  files[currentFile] = lastCode;
  lastCode = null;
  document.getElementById('apply-btn').disabled = true;
  addMessage('assistant', 'Codigo aplicado no arquivo "' + currentFile + '"! Confira e baixe quando quiser.');
}

document.getElementById('prompt').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); }
});
</script>
</body>
</html>
