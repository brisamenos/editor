<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollama Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { background: #16213e; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
header h1 { font-size: 18px; color: #e94560; }
#status { font-size: 12px; color: #888; }
#status.online { color: #4caf50; }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 240px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 10px 14px; font-size: 12px; color: #888; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
.sidebar-header span { color: #e94560; font-weight: 500; }
#file-list { flex: 1; overflow-y: auto; padding: 6px; }
.file-item { padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; border: 1px solid transparent; }
.file-item:hover { background: #0f3460; }
.file-item.active { background: #0f3460; border-color: #e94560; }
.file-item .fname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.file-item .del { color: #555; background: none; border: none; cursor: pointer; font-size: 15px; padding: 0 4px; flex-shrink: 0; }
.file-item .del:hover { color: #e94560; }
label.upload-btn { margin: 10px; background: #0f3460; border: 1px dashed #e94560; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; font-size: 12px; color: #e94560; display: block; }
label.upload-btn:hover { background: #1a1a2e; }
#file-input { display: none; }
.editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.editor-toolbar { background: #16213e; padding: 8px 14px; border-bottom: 1px solid #0f3460; display: flex; gap: 8px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
.editor-toolbar .fname-label { font-size: 12px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
button.tb-btn { background: #0f3460; border: 1px solid #0f3460; border-radius: 6px; padding: 5px 12px; color: #e0e0e0; font-size: 12px; cursor: pointer; white-space: nowrap; }
button.tb-btn:hover { border-color: #e94560; color: #e94560; }
button.tb-btn.primary { background: #e94560; border-color: #e94560; color: white; }
button.tb-btn.primary:hover { background: #c73652; }
button.tb-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#editor { flex: 1; background: #0d0d1a; color: #e0e0e0; border: none; padding: 16px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; overflow-y: auto; }
#editor.streaming { border-top: 2px solid #e94560; }
#streaming-indicator { position: absolute; top: 44px; right: 12px; background: #e94560; color: white; font-size: 11px; padding: 3px 10px; border-radius: 10px; display: none; }
#streaming-indicator.show { display: block; }
.chat-panel { width: 360px; background: #16213e; border-left: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
.chat-panel-header { padding: 10px 14px; border-bottom: 1px solid #0f3460; font-size: 12px; color: #888; }
#messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.msg { padding: 8px 12px; border-radius: 10px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg.user { background: #0f3460; align-self: flex-end; max-width: 90%; border-bottom-right-radius: 4px; }
.msg.assistant { background: #1a1a2e; align-self: flex-start; max-width: 95%; border: 1px solid #0f3460; border-bottom-left-radius: 4px; }
.msg.thinking { color: #888; font-style: italic; }
.msg.success { border-color: #4caf50; color: #4caf50; }
.msg.error { border-color: #e94560; color: #e94560; }
#chat-input-area { padding: 10px; border-top: 1px solid #0f3460; display: flex; flex-direction: column; gap: 8px; }
#prompt { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px; padding: 8px 12px; color: #e0e0e0; font-size: 12px; resize: none; min-height: 55px; max-height: 100px; outline: none; width: 100%; }
#prompt:focus { border-color: #e94560; }
.chat-actions { display: flex; gap: 6px; }
.api-config { padding: 8px 14px; border-top: 1px solid #0f3460; display: flex; gap: 6px; align-items: center; }
.api-config input { flex: 1; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; padding: 4px 8px; color: #e0e0e0; font-size: 11px; outline: none; }
.api-config label { font-size: 11px; color: #555; white-space: nowrap; }
.progress-bar { height: 2px; background: #e94560; width: 0%; transition: width 0.1s; display: none; }
.progress-bar.show { display: block; }
</style>
</head>
<body>

<header>
  <h1>Ollama Editor</h1>
  <span id="status">Verificando...</span>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Arquivos <span id="file-count">0</span></div>
    <div id="file-list"></div>
    <label class="upload-btn" for="file-input">+ Carregar arquivos</label>
    <input type="file" id="file-input" multiple accept=".html,.js,.ts,.jsx,.tsx,.css,.json,.md,.txt,.php,.py,.sql,.env,.vue,.scss,.xml">
  </div>

  <div class="editor-area">
    <div class="editor-toolbar">
      <span class="fname-label" id="current-file">Nenhum arquivo selecionado</span>
      <button class="tb-btn" onclick="undoEdit()" id="undo-btn" disabled>Desfazer</button>
      <button class="tb-btn" onclick="downloadFile()" id="download-btn" disabled>Baixar</button>
      <button class="tb-btn" onclick="downloadAll()" id="download-all-btn" disabled>Baixar todos</button>
    </div>
    <div class="progress-bar" id="progress-bar"></div>
    <div id="streaming-indicator">Editando...</div>
    <textarea id="editor" placeholder="Selecione um arquivo para editar..." readonly></textarea>
  </div>

  <div class="chat-panel">
    <div class="chat-panel-header">Chat — descreva o que quer editar</div>
    <div id="messages">
      <div class="msg assistant">Ola! Carregue seus arquivos HTML, JS, CSS e me diga o que quer modificar. O codigo vai aparecer no editor em tempo real enquanto edito.</div>
    </div>
    <div id="chat-input-area">
      <textarea id="prompt" placeholder="Ex: Adicione um botao flutuante de WhatsApp..."></textarea>
      <div class="chat-actions">
        <button class="tb-btn primary" onclick="askAI()" id="ask-btn" style="flex:1">Editar com IA</button>
        <button class="tb-btn" onclick="revertEdit()" id="revert-btn" disabled title="Voltar versao anterior">Reverter</button>
      </div>
    </div>
    <div class="api-config">
      <label>API:</label>
      <input type="text" id="api-url" value="http://45.79.213.38:11434" placeholder="http://IP:11434">
      <button class="tb-btn" onclick="checkStatus()">OK</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let files = {};
let previousVersions = {};
let currentFile = null;

function getAPI() { return document.getElementById('api-url').value.trim(); }

async function checkStatus() {
  const s = document.getElementById('status');
  s.textContent = 'Verificando...'; s.className = '';
  try {
    const r = await fetch(getAPI() + '/api/tags');
    if (r.ok) { s.textContent = 'Conectado'; s.className = 'online'; }
    else { s.textContent = 'Erro ' + r.status; }
  } catch(e) { s.textContent = 'Sem conexao'; }
}
checkStatus();

document.getElementById('file-input').addEventListener('change', async function() {
  for (const file of this.files) {
    const text = await file.text();
    files[file.name] = text;
  }
  this.value = '';
  renderFileList();
  if (Object.keys(files).length > 0 && !currentFile) openFile(Object.keys(files)[0]);
  document.getElementById('download-all-btn').disabled = Object.keys(files).length === 0;
});

function renderFileList() {
  const el = document.getElementById('file-list');
  el.innerHTML = '';
  const names = Object.keys(files);
  document.getElementById('file-count').textContent = names.length;
  names.forEach(name => {
    const div = document.createElement('div');
    div.className = 'file-item' + (name === currentFile ? ' active' : '');
    div.innerHTML = `<div class="fname" title="${name}">${name}</div><button class="del" onclick="event.stopPropagation();deleteFile('${name}')">x</button>`;
    div.addEventListener('click', () => openFile(name));
    el.appendChild(div);
  });
}

function openFile(name) {
  if (currentFile && document.getElementById('editor').value !== files[currentFile]) {
    files[currentFile] = document.getElementById('editor').value;
  }
  currentFile = name;
  const editor = document.getElementById('editor');
  editor.value = files[name];
  editor.readOnly = false;
  document.getElementById('current-file').textContent = name;
  document.getElementById('download-btn').disabled = false;
  document.getElementById('undo-btn').disabled = !previousVersions[name];
  document.getElementById('revert-btn').disabled = !previousVersions[name];
  renderFileList();
}

function deleteFile(name) {
  delete files[name];
  delete previousVersions[name];
  if (currentFile === name) {
    currentFile = null;
    const editor = document.getElementById('editor');
    editor.value = '';
    editor.readOnly = true;
    document.getElementById('current-file').textContent = 'Nenhum arquivo selecionado';
    document.getElementById('download-btn').disabled = true;
    document.getElementById('undo-btn').disabled = true;
    document.getElementById('revert-btn').disabled = true;
  }
  renderFileList();
}

function downloadFile() {
  if (!currentFile) return;
  files[currentFile] = document.getElementById('editor').value;
  const blob = new Blob([files[currentFile]], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFile;
  a.click();
}

async function downloadAll() {
  if (currentFile) files[currentFile] = document.getElementById('editor').value;
  const zip = new JSZip();
  Object.entries(files).forEach(([name, content]) => zip.file(name, content));
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'arquivos-editados.zip';
  a.click();
}

function undoEdit() {
  if (!currentFile || !previousVersions[currentFile]) return;
  files[currentFile] = previousVersions[currentFile];
  document.getElementById('editor').value = previousVersions[currentFile];
  delete previousVersions[currentFile];
  document.getElementById('undo-btn').disabled = true;
  document.getElementById('revert-btn').disabled = true;
  addMessage('assistant', 'Versao anterior restaurada!');
}

function revertEdit() { undoEdit(); }

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

function extractCode(text) {
  const match = text.match(/```[\w]*\n?([\s\S]*?)```/);
  return match ? match[1].trim() : null;
}

function setStreaming(active) {
  const editor = document.getElementById('editor');
  const indicator = document.getElementById('streaming-indicator');
  const progress = document.getElementById('progress-bar');
  if (active) {
    editor.classList.add('streaming');
    indicator.classList.add('show');
    progress.classList.add('show');
    progress.style.width = '0%';
  } else {
    editor.classList.remove('streaming');
    indicator.classList.remove('show');
    progress.classList.remove('show');
    progress.style.width = '100%';
    setTimeout(() => { progress.style.width = '0%'; progress.classList.remove('show'); }, 300);
  }
}

async function askAI() {
  if (!currentFile) { addMessage('error', 'Selecione um arquivo primeiro!'); return; }
  const promptEl = document.getElementById('prompt');
  const prompt = promptEl.value.trim();
  if (!prompt) return;

  files[currentFile] = document.getElementById('editor').value;
  previousVersions[currentFile] = files[currentFile];

  addMessage('user', prompt + ' [' + currentFile + ']');
  promptEl.value = '';

  const btn = document.getElementById('ask-btn');
  btn.disabled = true;
  setStreaming(true);

  const editor = document.getElementById('editor');
  editor.value = '';

  const systemPrompt = `Voce e um assistente de edicao de codigo. Retorne APENAS o codigo completo modificado dentro de um bloco de codigo markdown, sem explicacoes antes ou depois. Formato: \`\`\`html\n(codigo aqui)\n\`\`\``;

  const userContent = `Arquivo: ${currentFile}\n\nConteudo:\n\`\`\`\n${previousVersions[currentFile]}\n\`\`\`\n\nModificacao: ${prompt}`;

  try {
    const response = await fetch(getAPI() + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gemma4:e2b',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userContent }
        ],
        stream: true
      })
    });

    let fullReply = '';
    let inCodeBlock = false;
    let codeBuffer = '';
    let headerSkipped = false;

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value).split('\n').filter(l => l.trim());
      for (const line of lines) {
        try {
          const data = JSON.parse(line);
          if (data.message && data.message.content) {
            const chunk = data.message.content;
            fullReply += chunk;

            for (let i = 0; i < chunk.length; i++) {
              codeBuffer += chunk[i];

              if (!inCodeBlock && codeBuffer.includes('```')) {
                const afterTick = codeBuffer.indexOf('```') + 3;
                const rest = codeBuffer.slice(afterTick);
                if (rest.includes('\n')) {
                  inCodeBlock = true;
                  headerSkipped = true;
                  const codeStart = rest.indexOf('\n') + 1;
                  editor.value = rest.slice(codeStart);
                  codeBuffer = '';
                }
              } else if (inCodeBlock) {
                if (codeBuffer.endsWith('```')) {
                  const finalCode = editor.value.slice(0, editor.value.length - 2);
                  editor.value = finalCode;
                  inCodeBlock = false;
                } else {
                  editor.value = codeBuffer.replace(/^```[\w]*\n?/, '');
                }
                editor.scrollTop = editor.scrollHeight;
              }
            }
          }
        } catch(e) {}
      }
    }

    const finalCode = extractCode(fullReply);
    if (finalCode) {
      editor.value = finalCode;
      files[currentFile] = finalCode;
      document.getElementById('undo-btn').disabled = false;
      document.getElementById('revert-btn').disabled = false;
      addMessage('success', 'Pronto! Arquivo editado. Baixe quando quiser.');
    } else {
      editor.value = previousVersions[currentFile];
      files[currentFile] = previousVersions[currentFile];
      addMessage('error', 'Nao consegui extrair o codigo. Tente novamente com uma instrucao mais especifica.');
    }

  } catch(e) {
    editor.value = previousVersions[currentFile] || '';
    addMessage('error', 'Erro ao conectar. Verifique o IP da API.');
  }

  setStreaming(false);
  btn.disabled = false;
}

document.getElementById('prompt').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); }
});
</script>
</body>
</html>
